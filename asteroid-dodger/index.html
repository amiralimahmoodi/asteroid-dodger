<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asteroid Dodger</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div id="overlay" class="overlay">
    <div class="card">
      <h2>Asteroid Dodger</h2>
      <p>Press Space or click the button to start.</p>
      <button id="startBtn">✅ Play Now</button>
    </div>
  </div>

  <main class="wrap">
    <header>
      <h1>Asteroid Dodger</h1>
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>High: <span id="high">0</span></div>
      </div>
    </header>
    <canvas id="game" width="480" height="640"></canvas>
    <section class="controls">
      Controls: <kbd>←</kbd>/<kbd>A</kbd> and <kbd>→</kbd>/<kbd>D</kbd> to move,
      <kbd>Space</kbd> to start/restart.
    </section>
  </main>

  <script src="./game.js"></script>
</body>
</html>
