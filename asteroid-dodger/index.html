<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Asteroid Dodger</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel:rgba(255,255,255,.08);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.72);
      --accent:#7aa2ff;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(1200px 800px at 50% 30%, #18224a, var(--bg));
      color:var(--text);
      display:grid;
      place-items:center;
    }
    .wrap{width:min(720px,94vw); display:grid; gap:14px}
    header{display:flex; align-items:baseline; justify-content:space-between; gap:16px}
    h1{margin:0; font-size:20px; letter-spacing:.4px}
    .hud{
      display:flex; gap:14px;
      padding:8px 12px;
      border-radius:12px;
      background:var(--panel);
      color:var(--muted);
      font-size:14px;
    }
    .hud span{color:var(--text); font-variant-numeric:tabular-nums}

    canvas{
      width:100%;
      height:auto;
      border-radius:16px;
      background:rgba(0,0,0,.25);
      box-shadow:0 20px 50px rgba(0,0,0,.45);
      outline:1px solid rgba(255,255,255,.08);
      touch-action:none;
    }
    .controls{color:var(--muted); font-size:14px; line-height:1.5}
    kbd{
      font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      padding:2px 6px; border-radius:6px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
    }

    .overlay{
      position:fixed; inset:0;
      display:grid; place-items:center;
      background:rgba(0,0,0,.55);
      backdrop-filter:blur(6px);
    }
    .overlay.hidden{display:none}
    .card{
      width:min(520px,92vw);
      padding:18px;
      border-radius:16px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
    }
    .card h2{margin:0 0 8px; font-size:18px}
    .card p{margin:0 0 12px; color:var(--muted)}
    button{
      appearance:none; border:0; cursor:pointer;
      padding:10px 12px; border-radius:12px;
      background:linear-gradient(180deg,#8bb1ff,#5b86ff);
      color:#071027; font-weight:700;
    }
    button:active{transform:translateY(1px)}
  </style>
</head>

<body>
  <main class="wrap">
    <header>
      <h1>Asteroid Dodger</h1>
      <div class="hud">
        <div>Score: <span id="score">0</span></div>
        <div>High: <span id="high">0</span></div>
      </div>
    </header>

    <canvas id="game" width="480" height="640"></canvas>

    <section class="controls">
      Controls: <kbd>←</kbd>/<kbd>A</kbd> and <kbd>→</kbd>/<kbd>D</kbd> to move,
      <kbd>Space</kbd> to start/restart. (Touch: left/right side of canvas)
    </section>
  </main>

  <div id="overlay" class="overlay">
    <div class="card">
      <h2 id="overlayTitle">Asteroid Dodger</h2>
      <p id="overlayText">Press <b>Space</b> to start.</p>
      <button id="startBtn">Start</button>
    </div>
  </div>

  <script>
    // --- Safe boot (prevents "white page" due to missing elements) ---
    const canvas = document.getElementById("game");
    const ctx = canvas?.getContext?.("2d");
    const scoreEl = document.getElementById("score");
    const highEl = document.getElementById("high");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startBtn = document.getElementById("startBtn");

    if (!canvas || !ctx || !scoreEl || !highEl || !overlay || !startBtn) {
      document.body.innerHTML =
        "<pre style='color:#fff;background:#000;padding:16px'>Fatal: HTML elements not found. Make sure you copied the whole file.</pre>";
      throw new Error("Missing DOM elements");
    }

    const W = canvas.width, H = canvas.height;
    const keys = new Set();

    const state = {
      running: false,
      lastTime: 0,
      score: 0,
      high: Number(localStorage.getItem("ad_high") || 0),
      spawnTimer: 0,
      spawnEvery: 0.65, // seconds
      baseSpeed: 220,   // px/s
      touchDir: 0,      // -1, 0, +1
    };

    highEl.textContent = state.high;

    const player = {
      w: 46, h: 18,
      x: W / 2, y: H - 70,
      speed: 380,
    };

    let asteroids = [];

    function showOverlay() { overlay.classList.remove("hidden"); }
    function hideOverlay() { overlay.classList.add("hidden"); }
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function rectsOverlap(a, b) {
      return (
        a.x - a.w / 2 < b.x + b.w / 2 &&
        a.x + a.w / 2 > b.x - b.w / 2 &&
        a.y - a.h / 2 < b.y + b.h / 2 &&
        a.y + a.h / 2 > b.y - b.h / 2
      );
    }

    function resetGame() {
      state.score = 0;
      state.spawnTimer = 0;
      state.spawnEvery = 0.65;
      state.baseSpeed = 220;

      player.x = W / 2;
      player.y = H - 70;

      asteroids = [];
      scoreEl.textContent = "0";
    }

    function startGame() {
      resetGame();
      state.running = true;
      state.lastTime = performance.now();
      hideOverlay();
      requestAnimationFrame(loop);
    }

    function gameOver() {
      state.running = false;
      if (state.score > state.high) {
        state.high = state.score;
        localStorage.setItem("ad_high", String(state.high));
        highEl.textContent = String(state.high);
      }
      overlayTitle.textContent = "Game Over";
      overlayText.textContent = `Score: ${state.score}. Press Space to try again.`;
      startBtn.textContent = "Restart";
      showOverlay();
    }

    function makeRockPoints(r) {
      const pts = [];
      const n = 10;
      for (let i = 0; i < n; i++) {
        const ang = (i / n) * Math.PI * 2;
        const jitter = 0.72 + Math.random() * 0.35;
        pts.push({ x: Math.cos(ang) * r * jitter, y: Math.sin(ang) * r * jitter });
      }
      return pts;
    }

    function spawnAsteroid() {
      const size = 18 + Math.random() * 34;
      const x = size / 2 + Math.random() * (W - size);
      const speed = state.baseSpeed + Math.random() * 220;
      const r = size / 2;

      asteroids.push({
        x, y: -size,
        w: size, h: size,
        vy: speed,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() * 2 - 1) * 2.2,
        pts: makeRockPoints(r)
      });
    }

    function update(dt) {
      const left = keys.has("ArrowLeft") || keys.has("a") || keys.has("A");
      const right = keys.has("ArrowRight") || keys.has("d") || keys.has("D");

      let dir = 0;
      if (left) dir -= 1;
      if (right) dir += 1;
      dir += state.touchDir;

      if (dir !== 0) player.x += dir * player.speed * dt;
      player.x = clamp(player.x, player.w / 2, W - player.w / 2);

      state.spawnTimer += dt;
      if (state.spawnTimer >= state.spawnEvery) {
        state.spawnTimer = 0;
        spawnAsteroid();
        state.spawnEvery = Math.max(0.28, state.spawnEvery * 0.992);
        state.baseSpeed = Math.min(620, state.baseSpeed + 2.5);
      }

      for (const a of asteroids) {
        a.y += a.vy * dt;
        a.rot += a.vr * dt;
      }
      asteroids = asteroids.filter(a => a.y < H + a.h);

      state.score += Math.floor(dt * 60);
      scoreEl.textContent = String(state.score);

      const p = { x: player.x, y: player.y, w: player.w, h: player.h };
      for (const a of asteroids) {
        if (rectsOverlap(p, a)) { gameOver(); break; }
      }
    }

    function drawStarfield() {
      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.7)";
      const t = state.score * 0.002;
      for (let i = 0; i < 80; i++) {
        const x = (i * 67.3) % W;
        const y = ((i * 131.7) + (t * 120)) % H;
        const r = (i % 3 === 0) ? 1.4 : 1.0;
        ctx.globalAlpha = (i % 7 === 0) ? 0.8 : 0.35;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "rgba(30, 50, 120, 0.35)");
      g.addColorStop(1, "rgba(10, 12, 24, 0.35)");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      drawStarfield();

      // player ship
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.fillStyle = "rgba(122, 162, 255, 0.95)";
      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, -18);
      ctx.lineTo(22, 14);
      ctx.lineTo(10, 10);
      ctx.lineTo(-10, 10);
      ctx.lineTo(-22, 14);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      // asteroids
      for (const a of asteroids) {
        ctx.save();
        ctx.translate(a.x, a.y);
        ctx.rotate(a.rot);

        ctx.fillStyle = "rgba(255, 210, 140, 0.92)";
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 3;

        ctx.beginPath();
        for (let i = 0; i < a.pts.length; i++) {
          const p = a.pts[i];
          if (i === 0) ctx.moveTo(p.x, p.y);
          else ctx.lineTo(p.x, p.y);
        }
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.restore();
      }

      const vg = ctx.createLinearGradient(0, H - 180, 0, H);
      vg.addColorStop(0, "rgba(0,0,0,0)");
      vg.addColorStop(1, "rgba(0,0,0,0.35)");
      ctx.fillStyle = vg;
      ctx.fillRect(0, H - 180, W, 180);
    }

    function loop(now) {
      if (!state.running) return;
      const dt = Math.min(0.033, (now - state.lastTime) / 1000);
      state.lastTime = now;
      update(dt);
      draw();
      if (state.running) requestAnimationFrame(loop);
    }

    // input
    window.addEventListener("keydown", (e) => {
      keys.add(e.key);
      if (e.key === " " || e.key === "Spacebar") {
        e.preventDefault();
        if (!state.running) startGame();
      }
    });
    window.addEventListener("keyup", (e) => keys.delete(e.key));

    // touch (mobile): left half = left, right half = right
    function handleTouch(e) {
      const rect = canvas.getBoundingClientRect();
      const touch = e.touches[0];
      if (!touch) return;
      const x = touch.clientX - rect.left;
      state.touchDir = (x < rect.width / 2) ? -1 : 1;
      e.preventDefault();
    }
    canvas.addEventListener("touchstart", handleTouch, { passive: false });
    canvas.addEventListener("touchmove", handleTouch, { passive: false });
    canvas.addEventListener("touchend", (e) => { state.touchDir = 0; e.preventDefault(); }, { passive: false });

    startBtn.addEventListener("click", () => { if (!state.running) startGame(); });

    // initial overlay
    overlayTitle.textContent = "Asteroid Dodger";
    overlayText.innerHTML = "Avoid the asteroids. Press <b>Space</b> to start.";
    startBtn.textContent = "Start";
    showOverlay();
  </script>
</body>
</html>
